<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Hub de Estudos Avançado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #111827;
            color: #f3f4f6;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: #1f2937;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid #374151;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #374151;
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.8rem;
            color: #3b82f6;
            font-weight: 600;
        }

        header h1 span {
            color: #60a5fa;
            font-size: 0.9rem;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .btn-back {
            background: #4b5563;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            display: none;
        }

        .btn-back:hover {
            background: #374151;
        }

        /* TELA 1: GRID DE MATÉRIAS */
        .section-title {
            font-size: 1.2rem;
            color: #9ca3af;
            margin: 1.5rem 0 0.75rem 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .subject-card {
            background: #111827;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .subject-card:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .subject-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .subject-count {
            font-size: 0.8rem;
            color: #9ca3af;
            background: #1f2937;
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* Bordas Customizadas das Matérias */
        .card-geometria { border-top: 4px solid #ef4444; }
        .card-algebra { border-top: 4px solid #3b82f6; }
        .card-literatura { border-top: 4px solid #ec4899; }
        .card-historia { border-top: 4px solid #f59e0b; }
        .card-arte { border-top: 4px solid #a855f7; }
        .card-gramatica { border-top: 4px solid #0d9488; }
        .card-redacao { border-top: 4px solid #ea580c; }
        .card-biologia { border-top: 4px solid #22c55e; }
        .card-quimica { border-top: 4px solid #06b6d4; }
        .card-fisica { border-top: 4px solid #6366f1; }
        .card-geografia { border-top: 4px solid #84cc16; }
        .card-filosofia { border-top: 4px solid #0ea5e9; }
        .card-robotica { border-top: 4px solid #f43f5e; }
        .card-introducao-projeto-final { border-top: 4px solid #eab308; }
        .card-desenvolvimento-web-ii { border-top: 4px solid #10b981; }
        .card-mobile { border-top: 4px solid #c084fc; }
        .card-outros { border-top: 4px solid #6b7280; }

        /* TELA 2: VISÃO INTERNA DA MATÉRIA */
        #details-screen {
            display: none;
        }

        .syllabus-box {
            background: #111827;
            border: 1px solid #374151;
            padding: 1.25rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .syllabus-title {
            font-size: 1.1rem;
            color: #60a5fa;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-upload-zone {
            border: 2px dashed #4b5563;
            border-radius: 6px;
            padding: 1.5rem;
            text-align: center;
            background: #1f2937;
            cursor: pointer;
            transition: border-color 0.2s;
            margin-bottom: 1rem;
        }

        .file-upload-zone:hover {
            border-color: #3b82f6;
        }

        .file-upload-zone p {
            color: #9ca3af;
            font-size: 0.95rem;
        }

        .file-upload-zone span {
            color: #3b82f6;
            font-weight: 600;
        }

        #file-input {
            display: none;
        }

        .attachment-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            color: #60a5fa;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 0.5rem;
            word-break: break-all;
        }

        .btn-remove-file {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 10px;
            text-decoration: underline;
        }

        /* Input de Objetivos por Matéria */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            background: #111827;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #374151;
        }

        .input-group input[type="text"] {
            flex: 3;
            background: #1f2937;
            border: 1px solid #4b5563;
            padding: 0.75rem;
            border-radius: 6px;
            color: #f3f4f6;
        }

        .input-group input[type="date"] {
            flex: 1;
            background: #1f2937;
            border: 1px solid #4b5563;
            padding: 0.75rem;
            border-radius: 6px;
            color: #f3f4f6;
        }

        .btn-add-object {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111827;
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
        }

        .task-item.completed {
            border-left-color: #10b981;
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            flex: 1;
        }

        .checkbox-container {
            width: 20px;
            height: 20px;
            border: 2px solid #4b5563;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-item.completed .checkbox-container {
            background: #10b981;
            border-color: #10b981;
        }

        .checkbox-container::after {
            content: '✓';
            color: white;
            font-size: 0.8rem;
            display: none;
        }

        .task-item.completed .checkbox-container::after {
            display: block;
        }

        .date-badge {
            font-size: 0.75rem;
            padding: 2px 6px;
            background: #1f2937;
            border-radius: 4px;
            color: #9ca3af;
            border: 1px solid #374151;
            margin-top: 4px;
            display: inline-block;
        }

        .date-badge.atrasada {
            color: #ef4444;
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            padding: 4px 8px;
        }

        .empty-state {
            text-align: center;
            color: #9ca3af;
            padding: 1.5rem 0;
            font-style: italic;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="main-title">JARVIS <span>Sprint Study Tracker</span></h1>
            <button class="btn-back" id="btn-back" onclick="showHomeScreen()">⬅ Voltar ao Hub</button>
        </header>

        <div id="home-screen">
            <div class="section-title">Matérias Normais</div>
            <div class="subjects-grid" id="grid-normais"></div>

            <div class="section-title">Matérias Técnicas</div>
            <div class="subjects-grid" id="grid-tecnicas"></div>
        </div>

        <div id="details-screen">
            <div class="syllabus-box">
                <div class="syllabus-title">📁 Anexar Ementa / Conteúdo Programático (PDF ou Imagem)</div>
                <div class="file-upload-zone" onclick="document.getElementById('file-input').click()">
                    <p>Arraste ou clique para <span>enviar o arquivo da ementa</span></p>
                    <input type="file" id="file-input" accept="application/pdf,image/*" onchange="uploadSyllabusFile(this)">
                </div>
                <div id="file-link-container"></div>
            </div>

            <div class="section-title" style="margin-top:0;">🎯 Objetivos e Metas Práticas</div>
            <div class="input-group">
                <input type="text" id="object-input" placeholder="Ex: Resolver lista de exercícios de matrizes" autocomplete="off">
                <input type="date" id="object-date">
                <button class="btn-add-object" onclick="addObject()">Adicionar</button>
            </div>

            <ul class="task-list" id="object-list"></ul>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAMMpNbBKgiIrak4Bu9wK81emNHJhUrKsQ",
            authDomain: "adriano2emba.firebaseapp.com",
            databaseURL: "https://adriano2emba-default-rtdb.firebaseio.com",
            projectId: "adriano2emba",
            storageBucket: "adriano2emba.firebasestorage.app",
            messagingSenderId: "174175436846",
            appId: "1:174175436846:web:372bb1fba10bd7097e1fbf"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const categories = {
            normais: [
                { id: 'geometria', name: 'Geometria' },
                { id: 'algebra', name: 'Álgebra' },
                { id: 'literatura', name: 'Literatura' },
                { id: 'historia', name: 'História' },
                { id: 'arte', name: 'Arte' },
                { id: 'gramatica', name: 'Gramática' },
                { id: 'redacao', name: 'Redação' },
                { id: 'biologia', name: 'Biologia' },
                { id: 'quimica', name: 'Química' },
                { id: 'fisica', name: 'Física' },
                { id: 'geografia', name: 'Geografia' },
                { id: 'filosofia', name: 'Filosofia' }
            ],
            tecnicas: [
                { id: 'robotica', name: 'Robótica' },
                { id: 'introducao-projeto-final', name: 'Introdução ao Projeto Final' },
                { id: 'desenvolvimento-web-ii', name: 'Desenvolvimento Web II' },
                { id: 'mobile', name: 'Mobile' },
                { id: 'outros', name: 'Outros' }
            ]
        };

        let dbState = {}; 
        let currentSubjectId = null;

        function init() {
            database.ref('study_hub_data').on('value', (snapshot) => {
                dbState = snapshot.val() || {};
                renderHub();
                if (currentSubjectId) {
                    renderSubjectDetails(currentSubjectId);
                }
            });

            document.getElementById('object-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addObject();
            });
        }

        function renderHub() {
            const gridNormais = document.getElementById('grid-normais');
            const gridTecnicas = document.getElementById('grid-tecnicas');
            
            gridNormais.innerHTML = '';
            gridTecnicas.innerHTML = '';

            categories.normais.forEach(sub => gridNormais.appendChild(createCardElement(sub)));
            categories.tecnicas.forEach(sub => gridTecnicas.appendChild(createCardElement(sub)));
        }

        function createCardElement(subject) {
            const div = document.createElement('div');
            div.className = `subject-card card-${subject.id}`;
            div.onclick = () => showSubjectScreen(subject.id, subject.name);

            const subData = dbState[subject.id] || {};
            const tasksList = subData.tasks ? Object.values(subData.tasks) : [];
            const pendingCount = tasksList.filter(t => !t.completed).length;

            div.innerHTML = `
                <span class="subject-name">${subject.name}</span>
                <span class="subject-count">${pendingCount} pendente(s)</span>
            `;
            return div;
        }

        function showSubjectScreen(id, name) {
            currentSubjectId = id;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('details-screen').style.display = 'block';
            document.getElementById('btn-back').style.display = 'block';
            document.getElementById('main-title').innerHTML = `JARVIS <span>Estudos / ${name}</span>`;
            
            renderSubjectDetails(id);
        }

        function showHomeScreen() {
            currentSubjectId = null;
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('details-screen').style.display = 'none';
            document.getElementById('btn-back').style.display = 'none';
            document.getElementById('main-title').innerHTML = `JARVIS <span>Sprint Study Tracker</span>`;
        }

        function renderSubjectDetails(id) {
            const subData = dbState[id] || {};
            
            // Exibir arquivo anexado se houver (Com correção de download seguro)
            const linkContainer = document.getElementById('file-link-container');
            if (subData.fileAttachment) {
                linkContainer.innerHTML = `
                    <button onclick="downloadSyllabusFile('${id}')" class="attachment-link" style="cursor:pointer;">
                        📄 Descarregar Ementa (${subData.fileAttachment.name})
                    </button>
                    <button class="btn-remove-file" onclick="removeSyllabusFile()">Excluir Anexo</button>
                `;
            } else {
                linkContainer.innerHTML = '';
            }

            // Renderizar objetivos
            const objectList = document.getElementById('object-list');
            objectList.innerHTML = '';

            const tasksArray = subData.tasks ? Object.entries(subData.tasks) : [];

            if (tasksArray.length === 0) {
                objectList.innerHTML = '<li class="empty-state">Nenhum objetivo criado para esta matéria, Senhor.</li>';
                return;
            }

            const hoje = new Date().setHours(0,0,0,0);

            tasksArray.forEach(([firebaseKey, task]) => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;

                let dateBadgeHTML = '';
                if (task.dueDate) {
                    const [ano, mes, dia] = task.dueDate.split('-');
                    const dataFormatada = `${dia}/${mes}/${ano}`;
                    const dataTarefa = new Date(ano, mes - 1, dia).getTime();
                    const estaAtrasada = !task.completed && dataTarefa < hoje;
                    dateBadgeHTML = `<br><span class="date-badge ${estaAtrasada ? 'atrasada' : ''}">📅 ${dataFormatada}${estaAtrasada ? ' (Atrasada)' : ''}</span>`;
                }

                li.innerHTML = `
                    <div class="task-left" onclick="toggleObject('${firebaseKey}', ${task.completed})">
                        <div class="checkbox-container"></div>
                        <div>
                            <span class="task-text">${escapeHTML(task.text)}</span>
                            ${dateBadgeHTML}
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteObject(event, '${firebaseKey}')">Excluir</button>
                `;
                objectList.appendChild(li);
            });
        }

        // Upload de Arquivo via Base64 direto no Realtime Database
        window.uploadSyllabusFile = function(input) {
            if (!currentSubjectId || !input.files || !input.files[0]) return;
            
            const file = input.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const base64Data = e.target.result;
                
                database.ref(`study_hub_data/${currentSubjectId}/fileAttachment`).set({
                    name: file.name,
                    type: file.type,
                    data: base64Data
                }).then(() => {
                    alert("Documento de ementa anexado e sincronizado na nuvem com sucesso, Senhor!");
                });
            };
            
            reader.readAsDataURL(file);
        };

        // Função injetada para contornar o bloqueio de exibição em lote do navegador (Forçar Download seguro)
        window.downloadSyllabusFile = function(id) {
            const subData = dbState[id];
            if (!subData || !subData.fileAttachment) return;

            const base64Data = subData.fileAttachment.data;
            const fileName = subData.fileAttachment.name;

            const downloadLink = document.createElement("a");
            downloadLink.href = base64Data;
            downloadLink.download = fileName;

            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        };

        window.removeSyllabusFile = function() {
            if (!currentSubjectId) return;
            if (confirm("Deseja mesmo deletar o arquivo da ementa do servidor, Senhor?")) {
                database.ref(`study_hub_data/${currentSubjectId}/fileAttachment`).remove();
            }
        };

        function addObject() {
            if (!currentSubjectId) return;
            const input = document.getElementById('object-input');
            const dateInput = document.getElementById('object-date');
            const text = input.value.trim();
            const dueDate = dateInput.value;

            if (text === '') return;

            const newTaskRef = database.ref(`study_hub_data/${currentSubjectId}/tasks`).push();
            newTaskRef.set({
                text: text,
                dueDate: dueDate || null,
                completed: false
            });

            input.value = '';
            dateInput.value = '';
        }

        function toggleObject(firebaseKey, currentStatus) {
            if (!currentSubjectId) return;
            database.ref(`study_hub_data/${currentSubjectId}/tasks/${firebaseKey}/completed`).set(!currentStatus);
        }

        function deleteObject(event, firebaseKey) {
            event.stopPropagation();
            if (!currentSubjectId) return;
            database.ref(`study_hub_data/${currentSubjectId}/tasks/${firebaseKey}`).remove();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        init();
    </script>
</body>
</html>
