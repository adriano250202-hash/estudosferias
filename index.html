<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Dashboard de Estudos Avançado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #111827;
            color: #f3f4f6;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #1f2937;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid #374151;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #374151;
            padding-bottom: 1rem;
        }

        header h1 {
            font-size: 1.8rem;
            color: #3b82f6;
            font-weight: 600;
        }

        header h1 span {
            color: #60a5fa;
            font-size: 0.9rem;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .stats-container {
            background: #111827;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-around;
            border: 1px solid #374151;
        }

        .stat-box {
            text-align: center;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: bold;
            color: #10b981;
        }
        
        #progress-pct {
            color: #3b82f6;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 2rem;
            background: #111827;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #374151;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"], select {
            background: #1f2937;
            border: 1px solid #4b5563;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            color: #f3f4f6;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"] {
            flex: 2;
        }

        select {
            flex: 1;
            cursor: pointer;
        }

        input[type="text"]:focus, select:focus {
            border-color: #3b82f6;
        }

        button.btn-add {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        button.btn-add:hover {
            background: #2563eb;
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111827;
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
            transition: all 0.2s;
        }

        .task-item.completed {
            border-left-color: #10b981;
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .task-content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .category-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            width: fit-content;
        }

        /* Classes de Estilização das Badges */
        .badge-geometria { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }
        .badge-algebra { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid #3b82f6; }
        .badge-programacao { background-color: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #10b981; }
        .badge-historia { background-color: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid #f59e0b; }
        .badge-outros { background-color: rgba(107, 114, 128, 0.2); color: #d1d5db; border: 1px solid #6b7280; }

        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            cursor: pointer;
        }

        .checkbox-container {
            width: 20px;
            height: 20px;
            border: 2px solid #4b5563;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .task-item.completed .checkbox-container {
            background: #10b981;
            border-color: #10b981;
        }

        .checkbox-container::after {
            content: '✓';
            color: white;
            font-size: 0.8rem;
            display: none;
        }

        .task-item.completed .checkbox-container::after {
            display: block;
        }

        .task-text {
            font-size: 1rem;
            word-break: break-word;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            color: #9ca3af;
            padding: 2rem 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>JARVIS <span>Sprint Study Tracker</span></h1>
        </header>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-val" id="total-tasks">0</div>
                <div style="color: #9ca3af; font-size: 0.85rem; margin-top: 4px;">Total de Metas</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="completed-tasks" style="color: #10b981;">0</div>
                <div style="color: #9ca3af; font-size: 0.85rem; margin-top: 4px;">Concluídas</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="progress-pct">0%</div>
                <div style="color: #9ca3af; font-size: 0.85rem; margin-top: 4px;">Eficiência</div>
            </div>
        </div>

        <div class="input-group">
            <div class="input-row">
                <input type="text" id="task-input" placeholder="Ex: Rever assunto de triângulos" autocomplete="off">
                <select id="category-input">
                    <option value="geometria">Geometria</option>
                    <option value="algebra">Álgebra</option>
                    <option value="programacao">Programação</option>
                    <option value="historia">História</option>
                    <option value="outros">Outros</option>
                </select>
            </div>
            <button class="btn-add" id="btn-add">Adicionar Meta de Estudo</button>
        </div>

        <ul class="task-list" id="task-list">
            </ul>
    </div>

    <script>
        const taskInput = document.getElementById('task-input');
        const categoryInput = document.getElementById('category-input');
        const btnAdd = document.getElementById('btn-add');
        const taskList = document.getElementById('task-list');
        const totalTasksEl = document.getElementById('total-tasks');
        const completedTasksEl = document.getElementById('completed-tasks');
        const progressPctEl = document.getElementById('progress-pct');

        let tasks = JSON.parse(localStorage.getItem('jarvis_study_tasks')) || [];

        function init() {
            renderTasks();
            setupEventListeners();
        }

        function renderTasks() {
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<li class="empty-state">Nenhuma meta de estudo cadastrada para estas férias, Senhor.</li>';
                updateStats();
                return;
            }

            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                
                const categoryNames = {
                    geometria: 'Geometria',
                    algebra: 'Álgebra',
                    programacao: 'Programação',
                    historia: 'História',
                    outros: 'Outros'
                };

                const categoryLabel = categoryNames[task.category] || 'Outros';
                
                li.innerHTML = `
                    <div class="task-left" onclick="toggleTask(${index})">
                        <div class="checkbox-container"></div>
                        <div class="task-content-wrapper">
                            <span class="category-badge badge-${task.category || 'outros'}">${categoryLabel}</span>
                            <span class="task-text">${escapeHTML(task.text)}</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteTask(event, ${index})">Excluir</button>
                `;
                
                taskList.appendChild(li);
            });

            updateStats();
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

            totalTasksEl.textContent = total;
            completedTasksEl.textContent = completed;
            progressPctEl.textContent = `${pct}%`;

            localStorage.setItem('jarvis_study_tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const text = taskInput.value.trim();
            const category = categoryInput.value;
            if (text === '') return;

            tasks.push({
                text: text,
                category: category,
                completed: false
            });

            taskInput.value = '';
            renderTasks();
        }

        window.toggleTask = function(index) {
            tasks[index].completed = !tasks[index].completed;
            renderTasks();
        };

        window.deleteTask = function(event, index) {
            event.stopPropagation();
            tasks.splice(index, 1);
            renderTasks();
        };

        function setupEventListeners() {
            btnAdd.addEventListener('click', addTask);
            taskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        init();
    </script>
</body>
</html>
