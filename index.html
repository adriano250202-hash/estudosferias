<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Dashboard de Estudos Avançado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #111827;
            color: #f3f4f6;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: #1f2937;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid #374151;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #374151;
            padding-bottom: 1rem;
        }

        header h1 {
            font-size: 1.8rem;
            color: #3b82f6;
            font-weight: 600;
        }

        header h1 span {
            color: #60a5fa;
            font-size: 0.9rem;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .stats-container {
            background: #111827;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-around;
            border: 1px solid #374151;
        }

        .stat-box {
            text-align: center;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: bold;
            color: #10b981;
        }
        
        #progress-pct {
            color: #3b82f6;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 2rem;
            background: #111827;
            padding: 1.25rem;
            border-radius: 8px;
            border: 1px solid #374151;
        }

        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="text"], input[type="date"], select {
            background: #1f2937;
            border: 1px solid #4b5563;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            color: #f3f4f6;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"] {
            flex: 2;
            min-width: 200px;
        }

        select {
            flex: 1;
            min-width: 150px;
            cursor: pointer;
        }

        input[type="date"] {
            flex: 1;
            min-width: 150px;
            cursor: pointer;
        }

        input[type="text"]:focus, select:focus, input[type="date"]:focus {
            border-color: #3b82f6;
        }

        button.btn-add {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        button.btn-add:hover {
            background: #2563eb;
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111827;
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
            transition: all 0.2s;
        }

        .task-item.completed {
            border-left-color: #10b981;
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .task-content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .meta-badges {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .category-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .date-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            background-color: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
        }

        .date-badge.atrasada {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }

        /* Cores das Categorias Normais */
        .badge-geometria { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }
        .badge-algebra { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid #3b82f6; }
        .badge-literatura { background-color: rgba(236, 72, 153, 0.2); color: #f472b6; border: 1px solid #ec4899; }
        .badge-historia { background-color: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid #f59e0b; }
        .badge-arte { background-color: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid #a855f7; }
        .badge-gramatica { background-color: rgba(45, 212, 191, 0.2); color: #2dd4bf; border: 1px solid #0d9488; }
        .badge-redacao { background-color: rgba(251, 146, 60, 0.2); color: #fb923c; border: 1px solid #ea580c; }
        .badge-biologia { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #22c55e; }
        .badge-quimica { background-color: rgba(6, 182, 212, 0.2); color: #22d3ee; border: 1px solid #06b6d4; }
        .badge-fisica { background-color: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid #6366f1; }
        .badge-geografia { background-color: rgba(132, 204, 22, 0.2); color: #a3e635; border: 1px solid #84cc16; }
        .badge-filosofia { background-color: rgba(14, 165, 233, 0.2); color: #38bdf8; border: 1px solid #0ea5e9; }

        /* Cores das Categorias Técnicas */
        .badge-robotica { background-color: rgba(244, 63, 94, 0.2); color: #fb7185; border: 1px solid #f43f5e; font-weight: 800; }
        .badge-introducao-projeto-final { background-color: rgba(250, 204, 21, 0.2); color: #fde047; border: 1px solid #eab308; font-weight: 800; }
        .badge-desenvolvimento-web-ii { background-color: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #10b981; font-weight: 800; }
        .badge-mobile { background-color: rgba(192, 132, 252, 0.2); color: #e9d5ff; border: 1px solid #c084fc; font-weight: 800; }
        .badge-outros { background-color: rgba(107, 114, 128, 0.2); color: #d1d5db; border: 1px solid #6b7280; }

        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            cursor: pointer;
        }

        .checkbox-container {
            width: 20px;
            height: 20px;
            border: 2px solid #4b5563;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .task-item.completed .checkbox-container {
            background: #10b981;
            border-color: #10b981;
        }

        .checkbox-container::after {
            content: '✓';
            color: white;
            font-size: 0.8rem;
            display: none;
        }

        .task-item.completed .checkbox-container::after {
            display: block;
        }

        .task-text {
            font-size: 1rem;
            word-break: break-word;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            color: #9ca3af;
            padding: 2rem 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>JARVIS <span>Sprint Study Tracker</span></h1>
        </header>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-val" id="total-tasks">0</div>
                <div style="color: #9ca3af; font-size: 0.85rem; margin-top: 4px;">Total de Metas</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="completed-tasks" style="color: #10b981;">0</div>
                <div style="color: #9ca3af; font-size: 0.85rem; margin-top: 4px;">Concluídas</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="progress-pct">0%</div>
                <div style="color: #9ca3af; font-size: 0.85rem; margin-top: 4px;">Eficiência</div>
            </div>
        </div>

        <div class="input-group">
            <div class="input-row">
                <input type="text" id="task-input" placeholder="Ex: Rever assunto de triângulos" autocomplete="off">
                
                <select id="category-input">
                    <optgroup label="Matérias Normais">
                        <option value="geometria">Geometria</option>
                        <option value="algebra">Álgebra</option>
                        <option value="literatura">Literatura</option>
                        <option value="historia">História</option>
                        <option value="arte">Arte</option>
                        <option value="gramatica">Gramática</option>
                        <option value="redacao">Redação</option>
                        <option value="biologia">Biologia</option>
                        <option value="quimica">Química</option>
                        <option value="fisica">Física</option>
                        <option value="geografia">Geografia</option>
                        <option value="filosofia">Filosofia</option>
                    </optgroup>
                    <optgroup label="Matérias Técnicas">
                        <option value="robotica">Robótica</option>
                        <option value="introducao-projeto-final">Introdução ao Projeto Final</option>
                        <option value="desenvolvimento-web-ii">Desenvolvimento Web II</option>
                        <option value="mobile">Mobile</option>
                    </optgroup>
                    <optgroup label="Geral">
                        <option value="outros">Outros</option>
                    </optgroup>
                </select>

                <input type="date" id="date-input" title="Data limite para conclusão (opcional)">
            </div>
            <button class="btn-add" id="btn-add">Adicionar Meta de Estudo</button>
        </div>

        <ul class="task-list" id="task-list">
            </ul>
    </div>

    <script>
        const taskInput = document.getElementById('task-input');
        const categoryInput = document.getElementById('category-input');
        const dateInput = document.getElementById('date-input');
        const btnAdd = document.getElementById('btn-add');
        const taskList = document.getElementById('task-list');
        const totalTasksEl = document.getElementById('total-tasks');
        const completedTasksEl = document.getElementById('completed-tasks');
        const progressPctEl = document.getElementById('progress-pct');

        let tasks = JSON.parse(localStorage.getItem('jarvis_study_tasks')) || [];

        function init() {
            renderTasks();
            setupEventListeners();
        }

        function renderTasks() {
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<li class="empty-state">Nenhuma meta de estudo cadastrada para estas férias, Senhor.</li>';
                updateStats();
                return;
            }

            const hoje = new Date().setHours(0,0,0,0);

            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                
                const categoryNames = {
                    geometria: 'Geometria',
                    algebra: 'Álgebra',
                    literatura: 'Literatura',
                    historia: 'História',
                    arte: 'Arte',
                    gramatica: 'Gramática',
                    redacao: 'Redação',
                    biologia: 'Biologia',
                    quimica: 'Química',
                    fisica: 'Física',
                    geografia: 'Geografia',
                    filosofia: 'Filosofia',
                    robotica: 'Robótica',
                    'introducao-projeto-final': 'Introdução ao Projeto Final',
                    'desenvolvimento-web-ii': 'Desenvolvimento Web II',
                    mobile: 'Mobile',
                    outros: 'Outros'
                };

                const categoryLabel = categoryNames[task.category] || 'Outros';
                
                let dateBadgeHTML = '';
                if (task.dueDate) {
                    const [ano, mes, dia] = task.dueDate.split('-');
                    const dataFormatada = `${dia}/${mes}/${ano}`;
                    
                    const dataTarefa = new Date(ano, mes - 1, dia).getTime();
                    const estaAtrasada = !task.completed && dataTarefa < hoje;
                    
                    dateBadgeHTML = `<span class="date-badge ${estaAtrasada ? 'atrasada' : ''}">📅 ${dataFormatada}${estaAtrasada ? ' (Atrasada)' : ''}</span>`;
                }
                
                li.innerHTML = `
                    <div class="task-left" onclick="toggleTask(${index})">
                        <div class="checkbox-container"></div>
                        <div class="task-content-wrapper">
                            <div class="meta-badges">
                                <span class="category-badge badge-${task.category || 'outros'}">${categoryLabel}</span>
                                ${dateBadgeHTML}
                            </div>
                            <span class="task-text">${escapeHTML(task.text)}</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteTask(event, ${index})">Excluir</button>
                `;
                
                taskList.appendChild(li);
            });

            updateStats();
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

            totalTasksEl.textContent = total;
            completedTasksEl.textContent = completed;
            progressPctEl.textContent = `${pct}%`;

            localStorage.setItem('jarvis_study_tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const text = taskInput.value.trim();
            const category = categoryInput.value;
            const dueDate = dateInput.value;
            
            if (text === '') return;

            tasks.push({
                text: text,
                category: category,
                dueDate: dueDate || null,
                completed: false
            });

            taskInput.value = '';
            dateInput.value = '';
            renderTasks();
        }

        window.toggleTask = function(index) {
            tasks[index].completed = !tasks[index].completed;
            renderTasks();
        };

        window.deleteTask = function(event, index) {
            event.stopPropagation();
            tasks.splice(index, 1);
            renderTasks();
        };

        function setupEventListeners() {
            btnAdd.addEventListener('click', addTask);
            taskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        init();
    </script>
</body>
</html>
